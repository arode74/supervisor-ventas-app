<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin – APP Ventas</title>

  <script src="../env.js"></script>

  <link rel="icon" type="image/svg" href="../assets/logo_app_ventas.svg" />
  <link rel="stylesheet" href="../styles/institucional.css" />
  <link rel="stylesheet" href="../styles/panel-base.css" />
  <link rel="stylesheet" href="../styles/panel-base-responsive.css" />
  <link rel="stylesheet" href="../styles/panel-modulos.css" />

  <style>
    .bloque-admin{
      background:#eaf3ff;
      border-radius:12px;
      padding:16px 18px;
      margin:18px auto 0 auto;
      max-width:1180px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }
    .bloque-admin .linea-superior{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      text-align:center;
    }
    .bloque-admin .texto-nombre{
      font-weight:700;
      color:#003366;
    }
    .bloque-admin .texto-rol{
      font-weight:600;
      color:#003366;
      background:#dbeafe;
      border:1px solid #bfdbfe;
      border-radius:999px;
      padding:4px 12px;
    }
    .bloque-admin .separador{
      display:inline-block;
      width:10px;
    }

    #admin-shell{
      width:100%;
      max-width:1180px;
      margin:18px auto 0;
      padding:0 24px 24px;
      box-sizing:border-box;
    }

    .admin-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .admin-toolbar__left{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .admin-layout{
      display:grid;
      grid-template-columns:280px minmax(0,1fr);
      gap:18px;
      align-items:start;
    }
    .admin-menu{
      background:#fff;
      border-radius:14px;
      box-shadow:0 2px 12px rgba(0,0,0,.08);
      padding:16px;
      position:sticky;
      top:16px;
    }
    .admin-menu[hidden]{ display:none !important; }
    .admin-menu__grupo + .admin-menu__grupo{ margin-top:12px; }
    .admin-menu__titulo{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
      color:#5b6b7c;
      margin:0;
      padding:8px 4px;
      text-transform:uppercase;
      background:transparent;
      border:none;
      cursor:pointer;
    }
    .admin-menu__titulo-texto{ pointer-events:none; }
    .admin-menu__toggle{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:22px;
      height:22px;
      border-radius:999px;
      border:1px solid #d7e4f2;
      background:#f8fbff;
      color:#003366;
      font-size:15px;
      line-height:1;
      flex:0 0 auto;
      pointer-events:none;
    }
    .admin-menu__lista{
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:hidden;
      max-height:520px;
      opacity:1;
      transition:max-height .22s ease, opacity .18s ease, margin-top .18s ease;
      margin-top:8px;
    }
    .admin-menu__lista.colapsada{
      max-height:0;
      opacity:0;
      margin-top:0;
      pointer-events:none;
    }
    .admin-menu__item{
      width:100%;
      text-align:left;
      border:1px solid #d7e4f2;
      background:#f8fbff;
      color:#003366;
      border-radius:10px;
      padding:10px 12px;
      font-weight:600;
      cursor:pointer;
      transition:.18s ease;
    }
    .admin-menu__item:hover,
    .admin-menu__item.activo{
      background:#dbeafe;
      border-color:#93c5fd;
    }

    .admin-main{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .admin-submenu{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .admin-submenu__item{
      border:1px solid #d7e4f2;
      background:#fff;
      color:#003366;
      border-radius:999px;
      padding:9px 14px;
      font-weight:600;
      cursor:pointer;
    }
    .admin-submenu__item:hover,
    .admin-submenu__item.activo{
      background:#dbeafe;
      border-color:#93c5fd;
    }

    .admin-panel{
      background:#fff;
      border-radius:14px;
      box-shadow:0 2px 12px rgba(0,0,0,.08);
      padding:18px;
    }
    .admin-panel__header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .admin-panel__titulo{
      margin:0;
      color:#003366;
      font-size:24px;
      line-height:1.2;
    }
    .admin-panel__subtitulo{
      margin:6px 0 0 0;
      color:#4f5f70;
    }

    .admin-kpis{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:12px;
      margin-bottom:16px;
    }
    .admin-kpi{
      border:1px solid #d7e4f2;
      background:#f8fbff;
      border-radius:12px;
      padding:14px;
    }
    .admin-kpi__label{
      font-size:13px;
      color:#5b6b7c;
      margin:0 0 6px 0;
    }
    .admin-kpi__value{
      font-size:28px;
      font-weight:800;
      color:#003366;
      margin:0;
    }

    .admin-grid{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:16px;
    }
    .admin-card{
      border:1px solid #d7e4f2;
      border-radius:12px;
      padding:16px;
      background:#fff;
    }
    .admin-card h3{
      margin:0 0 10px 0;
      color:#003366;
      font-size:18px;
    }
    .admin-card ul{
      margin:0;
      padding-left:18px;
      color:#334155;
    }
    .admin-card li + li{ margin-top:8px; }

    .admin-filtros{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .admin-filtros input,
    .admin-filtros select{
      min-width:180px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      padding:10px 12px;
      font:inherit;
    }

    .admin-tabla-wrap{
      overflow:auto;
      border:1px solid #d7e4f2;
      border-radius:12px;
    }
    .admin-tabla{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
      background:#fff;
    }
    .admin-tabla th,
    .admin-tabla td{
      padding:12px 14px;
      border-bottom:1px solid #e5edf5;
      text-align:left;
      font-size:14px;
      color:#334155;
      vertical-align:top;
    }
    .admin-tabla th{
      background:#f8fbff;
      color:#003366;
      font-weight:700;
    }

    .estado-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
      white-space:nowrap;
    }
    .estado-pill.activo{ background:#ecfdf5; color:#166534; border-color:#bbf7d0; }
    .estado-pill.pendiente{ background:#fff7ed; color:#9a3412; border-color:#fed7aa; }
    .estado-pill.alerta{ background:#fef2f2; color:#991b1b; border-color:#fecaca; }

    .acciones-fila{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .btn-secundario{
      border:1px solid #cbd5e1;
      background:#fff;
      color:#003366;
      border-radius:8px;
      padding:7px 10px;
      font-weight:600;
      cursor:pointer;
    }


    /* AJUSTE ADMIN — Vista limpia sin botón menú ni submenú superior */
    #btnToggleMenu{
      display:none !important;
    }

    .admin-toolbar{
      justify-content:flex-end;
    }

    .admin-toolbar__left{
      width:100%;
      display:flex;
      justify-content:flex-end;
    }

    .admin-submenu{
      display:none !important;
    }

    @media (max-width: 960px){
      .admin-layout{ grid-template-columns:1fr; }
      .admin-menu{ position:static; }
      .admin-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
