<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cierre Mensual de Ventas – APP Ventas</title>

  <script src="../env.js"></script>

  <!-- CSS base (NO TOCADOS) -->
  <link rel="stylesheet" href="../styles/institucional.css" />
  <link rel="stylesheet" href="../styles/panel-base.css" />
  <link rel="stylesheet" href="../styles/panel-base-responsive.css" />

  <!-- Ajustes específicos SOLO para cierre -->
  <style>
    /* ===========================================================
       CIERRE VENTAS — Estilos mínimos del módulo
       La grilla fina queda gobernada desde panel-modulos.css
       =========================================================== */

    #modulo-cierre-ventas{
      width: 100%;
      max-width: 1100px !important;
      margin: 15px auto 0 auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.10);
      padding: 20px;
      box-sizing: border-box !important;
      overscroll-behavior: contain;
    }

    #modulo-cierre-ventas .tarjeta-principal{
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    #modulo-cierre-ventas .contenedor-tabla-head,
    #modulo-cierre-ventas .contenedor-tabla{
      width: 100%;
      box-sizing: border-box;
    }

    #modulo-cierre-ventas table.tabla-cierre{
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      margin: 0;
      box-shadow: none;
    }

    /* Blindaje local: vendedor no usa .nombre-vendedor para evitar conflicto con panel-base.css */
    #modulo-cierre-ventas #tablaCierre tbody td.cv-celda-vendedor{
      display: table-cell !important;
      text-align: left !important;
      vertical-align: middle !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      background-image: none !important;
      box-shadow: none !important;
    }

    #modulo-cierre-ventas #tablaCierre tbody td.cv-celda-vendedor .cv-vendedor{
      display: block !important;
      width: 100% !important;
      background: transparent !important;
      background-image: none !important;
      box-shadow: none !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
    }

    #modulo-cierre-ventas #tablaCierre tbody tr:nth-child(odd) td{
      background-color: #ffffff !important;
    }

    #modulo-cierre-ventas #tablaCierre tbody tr:nth-child(even) td{
      background-color: #f3f7fb !important;
    }

  </style>
</head>

<body>
  <section id="modulo-cierre-ventas">
    <div class="tarjeta-principal">

      <!-- HEADER -->
      <div class="modulo-header">
        <h2>Cierre Mensual de Ventas</h2>
        <button id="btnVolver" class="btn-volver" type="button">← Volver</button>
      </div>

      <!-- FILTROS + GUARDAR -->
      <div class="acciones-vendedores">
        <div class="filtros-vendedores" style="justify-content: space-between; width:100%; gap:12px;">
          <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <label style="margin:0;">
              Mes:
              <select id="selectMes">
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
              </select>
            </label>

            <label style="margin:0;">
              Año:
              <select id="selectAnio"></select>
            </label>
          </div>

          <button id="btnGuardarCierre" class="btn-volver" type="button">💾 Guardar</button>
        </div>
      </div>

      <!-- TABLA (solo aquí se hace scroll) -->
      <div class="contenedor-tabla" id="scrollCierre">
        
    <!-- Header fijo (NO scrollea) -->
    <div class="contenedor-tabla-head">
      <table id="tablaCierreHead" class="tabla-cierre">
        <colgroup>
            <col class="col-vendedor">
            <col class="col-contrato">
            <col class="col-tf">
            <col class="col-g40">
            <col class="col-g70">
            <col class="col-plan">
            <col class="col-pv">
          </colgroup>
        <thead>
            <tr>
              <th id="thVendedor" style="cursor:pointer; user-select:none;">Vendedor <span id="triVendedor">▲</span></th>
              <th>Contrato</th>
              <th>TF</th>
              <th id="thVentas" style="cursor:pointer; user-select:none;">&gt;40 <span id="triVentas">▼</span></th>
              <th>&gt;70</th>
              <th>Plan</th>
              <th>Producto Voluntario</th>
            </tr>

            <tr class="fila-total">
              <td>TOTAL</td>
              <td class="celda-total"></td>
              <td class="celda-total"><span id="totTF">0</span></td>
              <td class="celda-total"><span id="totG40">0</span></td>
              <td class="celda-total"><span id="totG70">0</span></td>
              <td class="celda-total"><span id="totPLAN">0</span></td>
              <td class="celda-total-pv"><span id="totPV">0</span></td>
            </tr>
          </thead>
      </table>
    </div>

    <!-- Solo esta zona scrollea -->
    <div class="contenedor-tabla">
      <table id="tablaCierre" class="tabla-cierre">
        <colgroup>
            <col class="col-vendedor">
            <col class="col-contrato">
            <col class="col-tf">
            <col class="col-g40">
            <col class="col-g70">
            <col class="col-plan">
            <col class="col-pv">
          </colgroup>
        <tbody>
            <tr><td colspan="7" style="text-align:center;">Cargando…</td></tr>
          </tbody>
      </table>
    </div>

      </div>

    </div>
  </section>

  <!-- Scripts -->
  <script type="module" src="../scripts/cierre_ventas.js"></script>
  <script type="module" src="../scripts/ui_modales.js"></script>
</body>
</html>
